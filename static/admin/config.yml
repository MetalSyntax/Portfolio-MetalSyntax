backend:
  name: github
  repo: MetalSyntax/Portfolio-MetalSyntax
  branch: master
  base_url: https://portfolio-oauth.wonderdxk.workers.dev
  auth_endpoint: auth

locale: es
media_folder: assets/img/projects
public_folder: assets/img/projects

collections:
  - name: portfolio
    label: Portafolio
    files:
      - name: projects
        label: Proyectos
        file: content/projects.json
        fields:
          - name: items
            label: Lista de Proyectos
            widget: list
            allow_add: true
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.title}} — {{fields.company}} ({{fields.year}})"
            fields:
              - { name: title, label: Título, widget: string }
              - name: company
                label: Empresa
                widget: select
                options:
                  - Personal
                  - Freelance
                  - Komax
                  - Genesis Agency
                  - Equipo 360
                  - Virtually Present
                  - kainver
                  - Domiserver
                  - Alcance Virtual SPA
                  - Multipro Consulting
              - { name: year, label: Año, widget: string }
              - { name: description_es, label: "Descripción (Español)", widget: text }
              - { name: description_en, label: "Description (English)", widget: text }
              - { name: description_pt, label: "Descrição (Português)", widget: text }
              - { name: link, label: Link, widget: string, default: "#" }
              - { name: image, label: "Nombre de imagen (sin -.jpg)", widget: string, hint: "Ejemplo: Parity (corresponde a assets/img/projects/Parity-.jpg)" }
              - name: icons
                label: Tecnologías
                widget: list
                allow_add: true
                collapsed: true
                summary: "{{fields.title}}"
                fields:
                  - { name: title, label: Nombre, widget: string }
                  - { name: image, label: "Archivo icono (sin .png)", widget: string, hint: "Ejemplo: Reactjs (corresponde a assets/img/tech/Reactjs.png)" }
      - name: achievements
        label: Certificados
        file: content/achievements.json
        fields:
          - name: items
            label: Lista de Certificados
            widget: list
            allow_add: true
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.title}} — {{fields.company}}"
            fields:
              - { name: title, label: Título, widget: string }
              - name: company
                label: Institución / Empresa
                widget: select
                options:
                  - Código Facilito
                  - CertiProf
                  - Platzi
                  - LinkedIn Learning
                  - Fundación Carlos Slim
                  - UJAP
                  - UCV
              - { name: academy, label: Academia (Opcional), widget: string, required: false }
              - { name: date, label: Fecha / Año, widget: string, required: false }
              - { name: link, label: Link, widget: string, default: "#" }
              - { name: image, label: "Nombre de imagen de diploma", widget: string, hint: "Ejemplo: CodigoFacilito (corresponde a assets/img/diplomas/CodigoFacilito.png)" }
      - name: experience
        label: Experiencia
        file: content/experience.json
        fields:
          - name: items
            label: Lista de Experiencia
            widget: list
            allow_add: true
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.company}} — {{fields.title_es}} ({{fields.yearfirst}})"
            fields:
              - { name: company, label: Empresa, widget: string }
              - { name: website, label: Sitio Web (sin https://), widget: string, default: "#" }
              - { name: image, label: "Nombre de logo", widget: string, hint: "Ejemplo: ditrali (corresponde a assets/img/bussines/ditrali.png)" }
              - { name: yearfirst, label: Fecha de Inicio (Ej. Jun. 2025), widget: string }
              - { name: yearlast_es, label: Fecha de Fin (ES), widget: string }
              - { name: yearlast_en, label: Fecha de Fin (EN), widget: string }
              - { name: yearlast_pt, label: Fecha de Fin (PT), widget: string }
              - { name: title_es, label: Cargo (Español), widget: string }
              - { name: title_en, label: Cargo (English), widget: string }
              - { name: title_pt, label: Cargo (Português), widget: string }
              - { name: task1_es, label: Tarea 1 (Español), widget: text }
              - { name: task1_en, label: Tarea 1 (English), widget: text }
              - { name: task1_pt, label: Tarea 1 (Português), widget: text }
              - { name: task2_es, label: Tarea 2 (Español), widget: text }
              - { name: task2_en, label: Tarea 2 (English), widget: text }
              - { name: task2_pt, label: Tarea 2 (Português), widget: text }
              - { name: task3_es, label: Tarea 3 (Español), widget: text }
              - { name: task3_en, label: Tarea 3 (English), widget: text }
              - { name: task3_pt, label: Tarea 3 (Português), widget: text }
