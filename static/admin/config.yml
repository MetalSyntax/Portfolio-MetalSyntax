backend:
  name: github
  repo: MetalSyntax/Portfolio-MetalSyntax
  branch: master
  base_url: https://portfolio-oauth.wonderdxk.workers.dev
  auth_endpoint: auth

locale: es
media_folder: assets/img/projects
public_folder: assets/img/projects

collections:
  - name: portfolio
    label: Portafolio
    files:
      - name: projects
        label: Proyectos
        file: content/projects.json
        fields:
          - name: items
            label: Lista de Proyectos
            widget: list
            allow_add: true
            collapsed: true
            minimize_collapsed: true
            summary: "{{fields.title}} — {{fields.company}} ({{fields.year}})"
            fields:
              - { name: title, label: Título, widget: string }
              - name: company
                label: Empresa
                widget: select
                options:
                  - Personal
                  - Freelance
                  - Komax
                  - Genesis Agency
                  - Equipo 360
                  - Virtually Present
                  - kainver
                  - Domiserver
                  - Alcance Virtual SPA
                  - Multipro Consulting
              - { name: year, label: Año, widget: string }
              - { name: description_es, label: "Descripción (Español)", widget: text }
              - { name: description_en, label: "Description (English)", widget: text }
              - { name: description_pt, label: "Descrição (Português)", widget: text }
              - { name: link, label: Link, widget: string, default: "#" }
              - { name: image, label: "Nombre de imagen (sin -.jpg)", widget: string, hint: "Ejemplo: Parity (corresponde a assets/img/projects/Parity-.jpg)" }
              - name: icons
                label: Tecnologías
                widget: list
                allow_add: true
                collapsed: true
                summary: "{{fields.title}}"
                fields:
                  - { name: title, label: Nombre, widget: string }
                  - { name: image, label: "Archivo icono (sin .png)", widget: string, hint: "Ejemplo: Reactjs (corresponde a assets/img/tech/Reactjs.png)" }
