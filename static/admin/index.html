<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>MetalSyntax Admin</title>
    <link rel="stylesheet" href="/admin/admin.css" />
    <script>
      window.CMS_MANUAL_INIT = true;
      // Vercel's catch-all returns HTML for /admin/config.yml.
      // We intercept that fetch so Decap initializes correctly during
      // the OAuth callback before CMS.init() injects the full config.
      const _origFetch = window.fetch.bind(window);
      window.fetch = function(url, ...args) {
        if (typeof url === 'string' && url.includes('config.yml')) {
          return Promise.resolve(new Response(
            'backend:\n  name: github\n  repo: MetalSyntax/Portfolio-MetalSyntax\n  branch: master\n  base_url: https://portfolio-oauth.wonderdxk.workers.dev\n  auth_endpoint: auth\n',
            { status: 200, headers: { 'Content-Type': 'application/x-yaml' } }
          ));
        }
        return _origFetch(url, ...args);
      };
    </script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@3.12.2/dist/decap-cms.js"></script>
    <script>
      CMS.init({
        config: {
          backend: {
            name: 'github',
            repo: 'MetalSyntax/Portfolio-MetalSyntax',
            branch: 'master',
            base_url: 'https://portfolio-oauth.wonderdxk.workers.dev',
            auth_endpoint: 'auth'
          },
          locale: 'es',
          logo_url: '/favicon-ms.ico',
          media_folder: 'assets/img/projects',
          public_folder: 'assets/img/projects',
          collections: [
            // ── Proyectos ────────────────────────────────────────────
            {
              name: 'projects',
              label: 'Proyectos',
              folder: 'content/projects',
              create: true,
              slug: '{{slug}}',
              extension: 'json',
              format: 'json',
              identifier_field: 'title',
              summary: '{{title}} — {{company}} ({{year}})',
              fields: [
                { name: 'draft', label: 'Borrador', widget: 'boolean', default: false },
                { name: 'title', label: 'Título', widget: 'string' },
                {
                  name: 'company',
                  label: 'Empresa',
                  widget: 'select',
                  options: [
                    'Personal', 'Freelance', 'Komax', 'Genesis Agency',
                    'Equipo 360', 'Virtually Present', 'kainver',
                    'Domiserver', 'Alcance Virtual SPA', 'Multipro Consulting'
                  ]
                },
                { name: 'year', label: 'Año', widget: 'string' },
                { name: 'description_es', label: 'Descripción (Español)', widget: 'text' },
                { name: 'description_en', label: 'Description (English)', widget: 'text' },
                { name: 'description_pt', label: 'Descrição (Português)', widget: 'text' },
                { name: 'link', label: 'Link', widget: 'string', default: '#' },
                {
                  name: 'image',
                  label: 'Imagen principal',
                  widget: 'image',
                  media_folder: '/assets/img/projects',
                  public_folder: 'img/projects'
                },
                {
                  name: 'icons',
                  label: 'Tecnologías',
                  widget: 'list',
                  allow_add: true,
                  collapsed: true,
                  summary: '{{fields.title}}',
                  fields: [
                { name: 'draft', label: 'Borrador', widget: 'boolean', default: false },
                    { name: 'title', label: 'Nombre', widget: 'string' },
                    {
                      name: 'image',
                      label: 'Icono',
                      widget: 'image',
                      media_folder: '/assets/img/tech',
                      public_folder: 'img/tech'
                    }
                  ]
                }
              ]
            },
            // ── Certificados ─────────────────────────────────────────
            {
              name: 'achievements',
              label: 'Certificados',
              folder: 'content/achievements',
              create: true,
              slug: '{{slug}}',
              extension: 'json',
              format: 'json',
              identifier_field: 'title',
              summary: '{{title}} — {{company}}',
              fields: [
                { name: 'draft', label: 'Borrador', widget: 'boolean', default: false },
                { name: 'title', label: 'Título', widget: 'string' },
                {
                  name: 'company',
                  label: 'Institución / Empresa',
                  widget: 'select',
                  options: [
                    'Código Facilito', 'CertiProf', 'Platzi',
                    'LinkedIn Learning', 'Fundación Carlos Slim', 'UJAP', 'UCV'
                  ]
                },
                { name: 'academy', label: 'Academia (Opcional)', widget: 'string', required: false },
                { name: 'link', label: 'Link', widget: 'string', default: '#' },
                {
                  name: 'image',
                  label: 'Imagen del diploma',
                  widget: 'image',
                  media_folder: '/assets/img/diplomas',
                  public_folder: 'img/diplomas',
                  hint: 'Se guarda como img/diplomas/nombre.png'
                }
              ]
            },
            // ── Experiencia ──────────────────────────────────────────
            {
              name: 'experience',
              label: 'Experiencia',
              folder: 'content/experience',
              create: true,
              slug: '{{slug}}',
              extension: 'json',
              format: 'json',
              identifier_field: 'company',
              summary: '{{company}} — {{title_es}} ({{yearfirst}})',
              fields: [
                { name: 'draft', label: 'Borrador', widget: 'boolean', default: false },
                { name: 'company', label: 'Empresa', widget: 'string' },
                { name: 'website', label: 'Sitio Web (sin https://)', widget: 'string', default: '#' },
                {
                  name: 'image',
                  label: 'Logo de la empresa',
                  widget: 'image',
                  media_folder: '/assets/img/bussines',
                  public_folder: 'img/bussines',
                  hint: 'Se guarda como img/bussines/nombre.png'
                },
                { name: 'yearfirst', label: 'Fecha de Inicio (Ej. Jun. 2025)', widget: 'string' },
                { name: 'yearlast_es', label: 'Fecha de Fin (ES)', widget: 'string' },
                { name: 'yearlast_en', label: 'Fecha de Fin (EN)', widget: 'string' },
                { name: 'yearlast_pt', label: 'Fecha de Fin (PT)', widget: 'string' },
                { name: 'title_es', label: 'Cargo (Español)', widget: 'string' },
                { name: 'title_en', label: 'Cargo (English)', widget: 'string' },
                { name: 'title_pt', label: 'Cargo (Português)', widget: 'string' },
                { name: 'task1_es', label: 'Tarea 1 (Español)', widget: 'text' },
                { name: 'task1_en', label: 'Tarea 1 (English)', widget: 'text' },
                { name: 'task1_pt', label: 'Tarea 1 (Português)', widget: 'text' },
                { name: 'task2_es', label: 'Tarea 2 (Español)', widget: 'text' },
                { name: 'task2_en', label: 'Tarea 2 (English)', widget: 'text' },
                { name: 'task2_pt', label: 'Tarea 2 (Português)', widget: 'text' },
                { name: 'task3_es', label: 'Tarea 3 (Español)', widget: 'text' },
                { name: 'task3_en', label: 'Tarea 3 (English)', widget: 'text' },
                { name: 'task3_pt', label: 'Tarea 3 (Português)', widget: 'text' }
              ]
            },
            // ── Skills ───────────────────────────────────────────────
            {
              name: 'skills',
              label: 'Skills',
              folder: 'content/skills',
              create: true,
              slug: '{{slug}}',
              extension: 'json',
              format: 'json',
              identifier_field: 'title',
              summary: '{{title}} — {{category}}',
              fields: [
                { name: 'draft', label: 'Borrador', widget: 'boolean', default: false },
                { name: 'title', label: 'Nombre', widget: 'string' },
                {
                  name: 'image',
                  label: 'Icono',
                  widget: 'image',
                  media_folder: '/assets/img/tech',
                  public_folder: 'img/tech'
                },
                {
                  name: 'category',
                  label: 'Categoría',
                  widget: 'select',
                  options: ['Frontend', 'Backend', 'Tools', 'Design', 'Database', 'DevOps', 'CMS', 'Mobile', 'NoCode']
                },
                { name: 'order', label: 'Orden (Número)', widget: 'number', value_type: 'int' }
              ]
            }
          ]
        }
      });
    </script>
    <script src="previews.js"></script>
  </body>
</html>
